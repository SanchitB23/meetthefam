name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # Base agent branches off `qa` (the active dev integration branch),
          # not the default `main`. Without this, claude-code-action branches
          # from main and misses every PR that has landed on qa since the
          # last release tag — catastrophic for consumer issues (e.g.
          # #91/#92/#93) that depend on foundation files (ErrorAlert,
          # mapErrorCode from #102) which live on qa but not yet on main.
          # Symptom: agent diffs show accidental deletion of post-release
          # files. Discovered 2026-05-22 during Phase 10 Wave C kickoff —
          # all three Wave C consumers branched off `3b2a45c` (v0.4.0 tag)
          # instead of the qa head, so their diffs vs qa would delete
          # everything merged in Wave A. Force-targeting `qa` here means
          # the agent always works against the current integration state.
          ref: qa

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr *)'

